name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bitespeed_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bitespeed_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: test
      NODE_ENV: test
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@localhost:5433/bitespeed_test?schema=public
      CORS_ORIGIN: http://localhost:3001
      LOG_LEVEL: silent
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 1000
      RUN_INTEGRATION_TESTS: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run prisma:deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t bitespeed-identity:test .
