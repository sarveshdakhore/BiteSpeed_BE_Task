services:
  - type: web
    name: bitespeed-identity-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8009
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://bitespeed.sarveshdakhore.in
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 100
      - key: DATABASE_URL
        fromDatabase:
          name: bitespeed-identity-db
          property: connectionString

databases:
  - name: bitespeed-identity-db
    plan: free
