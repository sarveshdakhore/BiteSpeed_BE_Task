services:
  app:
    build:
      context: .
      target: dev
    container_name: bitespeed-app-dev
    env_file:
      - .env.development.example
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bitespeed?schema=public
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

  db:
    image: postgres:16-alpine
    container_name: bitespeed-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bitespeed
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bitespeed']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - bitespeed_dev_db_data:/var/lib/postgresql/data

volumes:
  bitespeed_dev_db_data:
